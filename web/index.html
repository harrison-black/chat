<!DOCTYPE html>
<html>
    <head>
        <title>Chat App</title>
        <!-- For dev usage not prod. Using until migrating to framework -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <!-- Note this is the main file that is likely more than we need (DaisyUI has modular imports to reduce file size). 
            Likely changing when moving to framework -->
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    </head>
    <body class="py-10 px-20 bg-base-300">
        <div class="bg-base-100 rounded-md flex items-center h-15 w-1/11 mb-8">
            <h1 class="text-3xl underline underline-offset-8 decoration-wavy px-3">Chat App</h1>
        </div>

        <div id="mediaContainer" class="flex gap-4 mb-4">
            <div class="bg-base-100 flex-none w-2/3 relative rounded-md">
                <!-- 'autoplay' attribute required to render past the first frame
                        of the media stream -->
                <video id="remoteVideo" class="rounded-md aspect-video w-full" autoplay></video>
                <video id="localVideo" class="rounded-md absolute bottom-5 right-5 w-1/3 hidden" autoplay></video>
            </div>
            <div id="messageOutput" class="bg-base-100 rounded-md flex-none w-1/3 overflow-auto scroll-smooth"></div>
        </div>
        
        <div class="flex gap-4 h-20">
            <div class="flex flex-none items-center justify-center gap-4 w-2/3">
                <button id="startVideoButton" class="btn rounded-md">Start Video</button>
                <button id="endVideoButton" disabled class="btn rounded-md">End Video</button>
            </div>
            <div class="flex flex-none items-center w-1/3 rounded-md bg-base-100">
                <input
                    id="messageInput"
                    type="text"
                    placeholder="Write a message..."
                    class="input input-ghost w-full h-full"
                ></textarea>
                <button id="sendMessageButton" class="btn rounded-md">Send Message</button>
            </div>
        </div>

         <!-- adapter.js readme: adapter.js is a shim to insulate apps from spec changes 
         and prefix differences in WebRTC. The prefix differences are mostly gone these 
         days but differences in behaviour between browsers remain -->
        <script src="https://webrtc.github.io/adapter/adapter-9.0.2.js"></script>
        <script src="main.js"></script>
    </body>
</html>
