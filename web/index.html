<!DOCTYPE html>
<html>
    <head>
        <title>Chat App</title>
        <!-- For dev usage not prod. Using until migrating to framework -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>
    <body class="my-16 mx-20">
        <h1 class="text-7xl text-center mb-8">Chat App</h1>

        <div class="flex gap-4 mb-4">
            <div class="flex-none w-2/3 relative">
                <!-- 'autoplay' attribute required to render past the first frame
                        of the media stream -->
                <video id="remoteVideo" class="border aspect-video" autoplay></video>
                <video id="localVideo" class="border absolute bottom-5 right-5" autoplay></video>
            </div>
            <div class="border flex-none w-1/3">
                <ul id="messageOutput"></ul>
            </div>
        </div>
        
        <div class="flex gap-4">
            <div class="border flex-none w-2/3">
                <button id="startCallButton">Start Call</button>
                <button id="endCallButton">End Call</button>
                <button id="sendMessageButton">Send Message</button>
            </div>
            <div class="border flex-none w-1/3">
                <textarea
                    id="messageInput"
                    class="w-full"
                    placeholder="Send a message..."
                ></textarea>
            </div>
        </div>

         <!-- adapter.js readme: adapter.js is a shim to insulate apps from spec changes 
         and prefix differences in WebRTC. The prefix differences are mostly gone these 
         days but differences in behaviour between browsers remain -->
        <script src="https://webrtc.github.io/adapter/adapter-9.0.2.js"></script>
        <script src="main.js"></script>
    </body>
</html>
