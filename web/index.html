<!DOCTYPE html>
<html>
    <head>
        <title>Chat App</title>
        <!-- For dev usage not prod. Using until migrating to framework -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <!-- Note this is the main file that is likely more than we need (DaisyUI has modular imports to reduce file size). 
            Likely changing when moving to framework -->
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    </head>
    <body class="my-16 mx-20">
        <h1 class="text-7xl text-center mb-8">Chat App</h1>

        <div class="flex gap-4 mb-4">
            <div class="flex-none w-2/3 relative">
                <!-- 'autoplay' attribute required to render past the first frame
                        of the media stream -->
                <video id="remoteVideo" class="border border-primary-content rounded-md aspect-video w-full" autoplay></video>
                <video id="localVideo" class="rounded-md absolute bottom-5 right-5 w-1/3 hidden" autoplay></video>
            </div>
            <div class="border rounded-md border-primary-content flex-none w-1/3">
                <div id="messageOutput"></div>
            </div>
        </div>
        
        <div class="flex gap-4">
            <div class="flex flex-none items-center justify-center gap-4 w-2/3">
                <button id="startVideoButton" class="btn">Start Video</button>
                <button id="endVideoButton" disabled class="btn">End Video</button>
            </div>
            <div class="flex flex-none items-center w-1/3">
                <textarea
                    id="messageInput"
                    placeholder="Send a message..."
                    class="textarea border-primary-content w-full"
                ></textarea>
                <button id="sendMessageButton" class="btn">Send Message</button>
            </div>
        </div>

         <!-- adapter.js readme: adapter.js is a shim to insulate apps from spec changes 
         and prefix differences in WebRTC. The prefix differences are mostly gone these 
         days but differences in behaviour between browsers remain -->
        <script src="https://webrtc.github.io/adapter/adapter-9.0.2.js"></script>
        <script src="main.js"></script>
    </body>
</html>
